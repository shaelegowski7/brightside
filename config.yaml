# FBA Deal Scanner — thresholds, feeds, category rank table.
# Secrets (DATABASE_URL, KEEPA_API_KEY, DISCORD_WEBHOOK_URL, PWA_SHARED_SECRET)
# live in env vars, never here. See app/config.py for how this is loaded.

thresholds:
  min_roi: 0.30                # hard-reject below this (spec default: 30%)
  min_net_profit_pence: 300    # hard-reject below this (spec default: £3)
  max_fba_offers: 6            # hard-reject above this offer count
  rank_history_min_days: 90    # soft flag "<90 days of rank history" below this
  price_spike_pct: 0.20        # soft flag if buy box >20% above 90-day average
  cooldown_hours: 24           # don't re-ping same ASIN within this window...
  cooldown_price_improve_pct: 0.10   # ...unless buy price improved by >=10%

# vat_registered: true -> fee_vat_mult = 1.0 (fees reclaimed).
# false -> 1.20 (Amazon's 20% VAT on fees is unrecoverable). Set to your
# actual registration status — defaults to the conservative (worse-case) value.
vat_registered: false

# Reject anything flagged oversize tier (see fees.size_tier_thresholds_cm_kg).
reject_oversize: true

# Category names as they appear in Keepa's categoryTree[].name. Anything not
# listed falls back to `default_rank_threshold`. Placeholder values — tune
# against realised sell-through once scores/outcomes data exists.
category_rank_thresholds:
  default_rank_threshold: 150000
  "Toys & Games": 80000
  "Home & Kitchen": 100000
  "Kitchen & Home": 100000
  "Electronics": 60000
  "Computers & Accessories": 60000
  "PC": 60000
  "Video Games": 40000
  "Health & Personal Care": 120000
  "Beauty": 120000
  "Sports & Outdoors": 100000
  "Tools & Home Improvement": 100000
  "Grocery": 200000
  "Pet Supplies": 100000

# Categories to never ping regardless of numbers (Keepa categoryTree name match).
category_blocklist: []

hukd:
  poll_interval_minutes: 7
  # RSS feeds to poll. hotukdeals redirects /rss/hot -> /rss/trending (confirmed
  # live 2026-07-19) — use the resolved URL directly. Additional feeds use
  # https://www.hotukdeals.com/rss/tag/<slug> (NOT /rss/keyword/<term> as a
  # prior version of this comment claimed — that path 404s; confirmed live
  # 2026-07-23 that /rss/tag/<slug> is correct, hyphenated multi-word slugs,
  # 30 items/feed). Terms below chosen against the categories with the best
  # configured economics (fees.category_referral_pct: Electronics/PC/Computers
  # & Accessories at 8% vs 15% elsewhere; category_rank_thresholds: PC/
  # Electronics 60000, Video Games 40000, Toys & Games 80000).
  feeds:
    - name: trending
      url: "https://www.hotukdeals.com/rss/trending"
    - name: tag_ssd
      url: "https://www.hotukdeals.com/rss/tag/ssd"
    - name: tag_graphics_card
      url: "https://www.hotukdeals.com/rss/tag/graphics-card"
    - name: tag_laptop
      url: "https://www.hotukdeals.com/rss/tag/laptop"
    - name: tag_headphones
      url: "https://www.hotukdeals.com/rss/tag/headphones"
    - name: tag_monitor
      url: "https://www.hotukdeals.com/rss/tag/monitor"
    - name: tag_ps5
      url: "https://www.hotukdeals.com/rss/tag/ps5"
    - name: tag_xbox
      url: "https://www.hotukdeals.com/rss/tag/xbox"
    - name: tag_nintendo_switch
      url: "https://www.hotukdeals.com/rss/tag/nintendo-switch"
    - name: tag_lego
      url: "https://www.hotukdeals.com/rss/tag/lego"
    - name: tag_board_game
      url: "https://www.hotukdeals.com/rss/tag/board-game"
    - name: tag_power_tool
      url: "https://www.hotukdeals.com/rss/tag/power-tool"
    - name: tag_vacuum_cleaners
      url: "https://www.hotukdeals.com/rss/tag/vacuum-cleaners"
    - name: tag_air_fryer
      url: "https://www.hotukdeals.com/rss/tag/air-fryer"
  # Merchants that can never be a physical-goods FBA resale candidate —
  # flights/hotels/restaurants (not goods at all) and digital storefronts
  # (game keys, iTunes purchases — nothing to ship/resell). Filtered before
  # any resolver/Keepa call, not just before pinging. Exact match against
  # the feed's merchant name, case-insensitive. Derived from real
  # unverified_pinged noise observed live 2026-07-21 — see conversation.
  # Deliberately NOT blocking grocery chains (Lidl etc. run genuine non-food
  # specials) or "Apple Store"/"Xbox" (ambiguous: could be physical hardware
  # deals, not just digital) — those need better matching, not exclusion.
  merchant_blocklist:
    - "Skyscanner"
    - "Ryanair"
    - "Travelodge"
    - "McDonalds"
    - "giffgaff"
    - "Playstation Store"
    - "Nintendo eShop"
    - "Humble Bundle"
    - "WizzAir"
    - "Lebara"
    - "Loaded"
    - "AliExpress"
    - "Joybuy"

decision:
  inbound_shipping_pence: 40   # spec default £0.40/unit

# Reject a scraped/parsed buy price that's implausibly low vs the retailer
# page's own listed price — catches regex/parse mis-fires (e.g. "£1.00
# Longines") before they burn a Keepa lookup or look like a fake mega-ROI.
price_sanity:
  min_page_price_ratio: 0.05

# Velocity gate (Fix Build Guide phase 3): reject deals that are ROI-green
# but effectively dead stock. A deal must clear EITHER leg:
# - est_monthly_sales >= min_monthly_sales (Keepa monthlySold / rank-drop proxy), or
# - category_rank_percentile <= top_category_percentile, computed at the
#   *leaf* category level (see keepa_client.stage2_full's leaf_category_id/
#   leaf_category_rank) — root-level percentile is too coarse to mean
#   anything (verified live: top 2% of a 22M-product root category is a
#   looser bound than the existing default_rank_threshold).
velocity:
  min_monthly_sales: 10
  top_category_percentile: 0.02
  category_size_cache_ttl_days: 30

# Argos clearance scraper (Phase 2). Requires SCRAPERAPI_KEY — Argos's Akamai
# edge blocks every direct request from this app's hosting IP (confirmed
# 2026-07-20, even robots.txt), so fetches route through ScraperAPI's proxy
# pool. `enabled: false` by default: flipping it on triggers a one-off
# backfill pass of every current item in each listed category (spec: "no
# historical backfill, current inventory only"), which costs one ScraperAPI
# request per listing page *plus* one per new/changed product — budget
# accordingly against your ScraperAPI plan before adding more categories.
argos:
  enabled: true
  poll_interval_minutes: 180
  min_delay_seconds: 5
  max_delay_seconds: 15
  # Additional department clearance URLs discovered via the Wayback Machine's
  # CDX index (archive.org crawls from 2025-2026, since direct/ScraperAPI
  # discovery wasn't available in this environment — no live ScraperAPI key
  # configured locally). Argos category IDs (the `c:<id>` segment) are stable
  # long-lived identifiers, not session tokens, so these should still be
  # valid — but unlike the RSS feeds above, this could NOT be live-verified
  # before merging. If a category ID has gone stale, _parse_listing() and the
  # fetch-failure path already degrade gracefully (logs "[ARGOS] ... fetch
  # failed" or treats an empty page as "no more results" — see argos.py) so a
  # bad URL here can't crash the crawl, just silently contributes 0 deals.
  # Picked departments matching categories that already have tuned rank
  # thresholds below: toys (Toys & Games), health-and-beauty (Health &
  # Personal Care/Beauty), sports-and-leisure (Sports & Outdoors),
  # home-and-furniture (Home & Kitchen), garden-and-diy (Tools & Home
  # Improvement).
  category_urls:
    - "https://www.argos.co.uk/clearance/technology/c:29949/"
    - "https://www.argos.co.uk/clearance/toys/c:30299/"
    - "https://www.argos.co.uk/clearance/health-and-beauty/c:29203/"
    - "https://www.argos.co.uk/clearance/sports-and-leisure/c:30468/"
    - "https://www.argos.co.uk/clearance/home-and-furniture/c:29351/"
    - "https://www.argos.co.uk/clearance/garden-and-diy/c:797660/"

# Smyths Toys UK clearance/sale scraper. Same crawl_state (price-diff)
# pattern as Argos -- see app/sources/smyths.py's module docstring for the
# full recon writeup. Confirmed via Wayback Machine archive snapshots only
# (no local SCRAPERAPI_KEY was available to test live): Nuxt 3 (Vue SSR)
# storefront, product tiles parsed by DOM pattern (no __NEXT_DATA__-style
# array like Argos); GTIN comes from a data-loadbee-gtin="<ean>" attribute
# on the product page, NOT from JSON-LD (confirmed absent there on 2
# products). `enabled: false` — TWO things need live verification before
# flipping this on, not just the usual backfill-cost warning:
#   1. category_urls below is a best guess, NOT a confirmed working "browse
#      all sale items" URL — /uk/en-gb/sale was never successfully fetched
#      in this environment (always hit Smyths' Incapsula bot-challenge, in
#      4 of 6 attempts across the whole site, including via the Wayback
#      Machine's own crawler). A structurally similar page (/outdoor)
#      turned out to be a curated ~20-item CMS landing page with no
#      pagination, not a deep catalog — the real sale page may have the
#      same shape.
#   2. Whether ScraperAPI's standard proxy pool can bypass Smyths'
#      Incapsula/Imperva protection at all is unverified (a harder class of
#      block than Argos's Akamai — may need ScraperAPI's premium/JS-render
#      tier). If it can't get through, this source will just silently find
#      0 items every crawl rather than error.
smyths:
  enabled: false
  poll_interval_minutes: 180
  min_delay_seconds: 5
  max_delay_seconds: 15
  category_urls:
    - "https://www.smythstoys.com/uk/en-gb/sale"

# Pokemon Center UK restock/new-release monitor (Phase 3). Different signal
# than Argos: a "drop" is a stock-status transition, not a price change (see
# app/sources/pokemon_center.py). No EAN on this site at all, and no Keepa
# title-search fallback was built (project decision 2026-07-21) — every drop
# pings as "UNVERIFIED MATCH — check manually", with no ROI/price scoring.
# Cheap per poll (one listing-page request unless something actually drops),
# so a tighter interval than Argos is affordable — tune to taste.
pokemon_center:
  enabled: true
  poll_interval_minutes: 15
  min_delay_seconds: 3
  max_delay_seconds: 8
  # Additional categories, discovered the same way as Argos's above (Wayback
  # CDX index — no local ScraperAPI key to verify live). "back-in-stock" is a
  # direct match for this source's restock-monitor purpose; the others are
  # the classic high resale-value TCG product types (sealed boxes/packs are
  # the most commonly flipped Pokemon TCG items). Kept to a small addition —
  # this source has no EAN mechanism at all (_UNMATCHABLE_BY_DESIGN_SOURCES
  # in pipeline.py), so every hit here is an unscored "UNVERIFIED MATCH"
  # ping, not a profit-scored one; widening it trades noise for volume more
  # directly than HUKD/Argos do.
  category_urls:
    - "https://www.pokemoncenter.com/en-gb/category/new-releases"
    - "https://www.pokemoncenter.com/en-gb/category/back-in-stock"
    - "https://www.pokemoncenter.com/en-gb/category/elite-trainer-box"
    - "https://www.pokemoncenter.com/en-gb/category/booster-packs"

# Category-based fee estimate fallback (SP-API not live yet). Ballpark figures
# based on Amazon UK's public referral-fee schedule and FBA size tiers — verify
# against Amazon's current published rates before trusting the numbers; every
# ping using this table is marked fees=estimated regardless.
fees:
  default_referral_pct: 0.15
  category_referral_pct:
    "Electronics": 0.08
    "Computers & Accessories": 0.08
    "PC": 0.08
    "Video Games": 0.15
    "Toys & Games": 0.15
    "Home & Kitchen": 0.15
    "Kitchen & Home": 0.15
    "Health & Personal Care": 0.15
    "Beauty": 0.15
    "Sports & Outdoors": 0.15
    "Tools & Home Improvement": 0.15
    "Grocery": 0.15
    "Pet Supplies": 0.15
  # FBA fulfilment fee by size tier, in pence. Placeholder ballparks — replace
  # with Amazon UK's current published FBA fee schedule.
  fba_fee_by_size_tier_pence:
    small_standard: 230
    standard: 320
    large_standard: 450
    oversize: 900
  # Monthly storage fee per unit, pence — used in est_months_to_sell calc.
  # Rough blended standard-size non-peak rate; oversize items cost more.
  monthly_storage_fee_pence:
    standard: 27
    oversize: 60
  # Simplified UK FBA size-tier breakpoints (max dimension in cm, max weight
  # in kg). First tier a product fits under (in this order) wins.
  size_tier_thresholds_cm_kg:
    small_standard: {max_weight_kg: 0.46, max_longest_cm: 35, max_dims_sum_cm: 60}
    standard:       {max_weight_kg: 9.0,  max_longest_cm: 45, max_dims_sum_cm: 90}
    large_standard: {max_weight_kg: 23.0, max_longest_cm: 61, max_dims_sum_cm: 210}
    # anything larger/heavier than large_standard is oversize
